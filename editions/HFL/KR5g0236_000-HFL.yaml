front:
  text: 太清道林攝生論群七眞人曰雖常餌而不知養性之術亦難以長生也養性之道不欲飽食便卧及終日乆坐皆損壽也人欲小勞但莫大疲及强所不能堪耳人食畢當行步躊躇有所修爲爲快也故流水不腐户樞不蠹以其動故也人不得夜食食畢但當行步計使中數里徃來飽食即卧生百病不銷成積聚也食欲少而數不欲頓多難銷也常欲令如飽中饑饑中飽故善養性者先飢而食先渴而飲食畢當行行畢使人以手數摩腹上數百過易銷大益人令人能飲食無百病莫卧常習閉口口開即失氣又邪從口入屈膝側卧益人氣力勝正偃卧春欲瞑卧早起夏及秋欲侵夜乃卧早起冬欲早卧皆益人雖云早起莫在鷄鳴前雖言晚起莫在日出後冬天地閉血氣蔵人不可勞作岀汗發洩陽氣損人養性之道莫久行久立久坐久卧久聽久視莫再食莫强食莫大醉莫舉重莫憂思莫大怒悲愁莫大歡喜莫跳踉莫多哭莫汲汲於所欲莫悄悄懷忿恨皆損壽命若能不犯則長生也飲酒不欲使多多則速吐之爲佳醉不可以接房又不可當風卧不可久扇之皆即得病也醉不可露卧黍林穰中發癩瘡醉不可强食或發癰疽或發瘖或生瘡也醉飽交接小者靣皯咳嗽大者傷絶蔵脉損命醉飽不可以走車及跳躑不可忍小便因以交接使人得淋莖中痛靣失血色者也有人所怒血氣未定因以交接令人發癰疽婦人月候未絶而與交令人成病得白駁也新沐髮訖勿與當風勿濕結之勿以頭卧使人得頭眩悶髮頽面腫齒痛耳聾食畢當漱口數過令人牙齒不敗口香濕衣及汗衣皆不可久著令人發瘡及風瘙勿以漿水漱口令人口臰大汗能易者急洗之不尓令人小便不利春天不薄衣令人得傷寒霍亂不銷食頭痛抱朴子曰𢦙問所謂傷之者豈色欲之間乎答曰亦何獨斯哉然長生之要其在房中上士知之可以延年除病其次不以自伐若年尚少壯而知還陰丹以補腦採七答於長俗者不服藥物而不失一百二百歲也但不得仙耳不得其術者古人方之於凌柸之盛湯羽堂之蓄火也且又才所不逮而因思之者傷也力所不勝而强舉之者傷也深憂恚怒傷也悲哀憔悴傷也喜樂過度傷也急急所欲傷也戚戚所患傷也久談言笑傷也寢息失時傷也挽弓引弩傷也耽酒嘔吐傷也飽食而卧傷也跳走喘乏傷也歡呼哭泣傷也陰陽不交傷也積傷至盡盡則早亡盡則非道也以養性之方唾不涎逺行不疾步耳不極聽目不久視坐不至疲立不至疲卧不至懻先寒而衣先熱而解不欲極饑而食食不可過飽不欲極渴而飲飲不欲過多凡食過多則結積聚飲過多則成痰癖也不欲甚勞不欲甚逸不欲流汗不欲多唾不欲奔車走馬不欲極逺望不欲多生泠不欲飲酒當風不欲沐浴久之不欲廣志逺顧不欲窺造異巧冬不欲極温夏不欲極涼不欲露卧星下不欲眠中見扇大寒大熱大風大露皆欲冒之五味入口不欲偏多故酸多則傷脾苦多則傷肺辛多則傷肝鹹多則傷心甘多則傷腎此五行自然之理也凡言傷者亦不便而覺也謂久則傷壽耳是以善攝生者卧起有四時之早晚興居有至和之常制調利筋骨有偃仰之方杜疾閑邪有吞吐之術流行營衛有補瀉之法節宣勞逸有與奪之要忍怒以全陰氣抑喜以養陽氣然後先將草木以救虧缺後服金丹以定無窮養性之理盡於此矣若夫欲快意任懷自謂達識知命不泥異端極情肆力不營時久者聞此言也雖風之過耳電之經目不足喻也雖身枯於留連之中氣絶於綺紈之際而甘心焉亦安可告之以養性之事哉匪唯不納乃謂訞訛也而望彼信之所謂以明鑒給矇瞽以絲竹娱聾聵者也抱朴子曰一人之身一國之象也胷腹之猶宫室也四支之列猶郊境也骨節之分猶百官也神猶君也血猶臣也氣猶民也故能治民則能固也夫愛其民所以安其國人愛其炁所以全其身民散則國亡氣竭則身滅滅者不可生也亡者不可存也是以聖人銷未起之患治未病之疾醫之於無事之前不追之旣逝之後民難安而易危也氣難清而易濁也故審威德所以保社稷割嗜欲所以固血氣然後真一存焉三七守焉百病却焉年壽遐焉每旦初起靣向午展兩手於膝上心眼觀炁入頂下達涌泉旦旦如此名曰送氣常以鼻引炁口吐氣小㣲吐之不得開口復欲得出氣少入氣多每欲食先須送入腹每與食作主人寢不得語言五蔵如鐘磬不懸不可聲發行不得語欲語須住立乃語行語令人失氣凡人有四正行正坐正立正言正饑須食食須飽飽須行行作鵝王步語作含鐘聲眠作獅子眠左脇側地屈膝也每自詠歌云美食須熟嚼生食不麤吞問我居止處大宅物林村服息守五臟氣至骨成仙云云又歌云日食三箇毒不嚼而自消錦繡爲五蔵身着糞掃袍每云人會須守五神心肺脾腎肝言㝡不得浮思孤房猶獨處心想欲事大𢙣起邪每得至則峻坐久坐立溺久立坐溺家中有經像者行來禮拜之然後拜尊長日入後不用食云有鬼魅游其上人每須心不外縁意在涌泉十日一食葵葵滑所以通五藏擁氣又是菜之王不用合心而食欲食宜去心冬至日正可語不可言自言曰言答人曰語言有人來問則可答自不可强言也凡人必勿嗔之損人氣每冬至北壁下厚鋪草而卧云受元氣每至八月一日以後即微火暖足勿令下泠先生意常欲使炁在下勿欲泄上春凍未泮衣欲下厚上薄養陽收陰繼世長生養陰收陽則滅門此其行欲之事每日送氣氣通則流利勿食生菜生米小豆陳臭勿飲濁酒食麵則塞氣死人不用鬼行踖慄又不用多言笑不用逄人挽𢲻睡不厭踧覺不厭舒凡人舒而睡則鬼物得便時覺時乃可舒耳凡眠先卧心而後卧眼當熟嚼食使米脂入腸勿使酒脂入腹漸學少鹹必不得晝眠令人失氣人無五津五漏則得仙也四月十月不得入房陰陽純凡用事之月氣冬至起於涌泉足心下是十一月至膝十二月至股正月至腰名三陽成二月至膊三月至項四月至頂純陽用事陰亦仿此人當食勿煩惱如食五味必不得暴瞋則令人神驚夜夢飛揚累數爲煩偃觸爲惱人卧夜當作五覆怕逐更轉酒醉勿當風向陽令人發狂也大小便覺之即行勿忍之飽食勿入房日初入後勿入房亦勿言語讀誦必有讀誦寧待平旦凡行立坐勿背日月縱讀誦言語常想聲在氣海中臍下是也冬日觸泠行勿大語開口食訖以手摩靣腹令津液流通凡平旦欲得食訖然後洗梳也夏熱常食煖飯冬長食細米稠粥二月三月冝食韮大益人心常勿外縁是真人初學道法若能常如此者坐於温疫之中常當内視見五蔵如懸鐘了了分明不輟也旦起欲得專言善事不欲先計校錢財睡不厭踧舒凡居處不欲得綺美華麗令人貪婪無厭禍患之原但令雅素凈潔免風雨暑濕爲佳衣服器械勿用珠玉金寶增長過失使人煩惱根深厨膳勿使脯肉豐盈恒令儉約飲食勿多食宍生百病恒少食肉多食飯及菹菜每食不用重肉凡心有所愛不用深愛心有所憎不用深憎并損性傷神亦不深讚亦不深毁常須運心於物平等如覺偏頗尋即改正之居貧勿謂常貧居富勿謂常富居貧富之中恒須守道勿以貧富易志改性識達道理似不能言有大功德勿自矜伐人年五十至於百年美藥勿離手善言勿離口亂想勿經心恒以深至誠恭敬於物慎勿詐善以悅於心終身爲善爲人所嫌勿得起恨當以道德自平其心勿言行善不得善報以自怨仇居處勿令心有不足若有不足則自抑之勿令得起所至之處得多求則心自疲苦夫人之所以多病當由不能養性平康之日謂言常求然縱情恣欲心所憶得即便爲之不約禁忌欺罔幽明無所不作當自思念深生耻媿誠勤身心常修善省事故曰善攝生者常少思少念少欲少事少語少笑少愁少樂少喜少怒少好少惡此十二少者養性之都契也多思則神殆多念則神散多欲則無智多事則形勞多語則氣爭多笑則傷蔵多愁則心憍多樂則意溢多喜則妄錯昏亂多怒則百脉不定多好則專迷不理多惡則憔悴無歡此十二多不除喪生之本也唯無多無少者幾於道矣
