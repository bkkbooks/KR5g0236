body:
  text: 黄帝雜忌法第三要記曰一日之忌暮無飽食一月之忌暮無大醉一歲之忌暮無逺行終身之忌暮常護氣久視傷血久卧傷氣久立傷骨久行傷筋久坐傷肉鹹傷筋醋傷骨飽傷肺饑傷氣茅屋漏水墮諸脯宍上食之成癥結病凡作脯不肯乾者害人也𥙊神肉無故自動食之害人飲食上有蜂行住食中必有毒害也一日之忌夜莫飽食一月之忌暮莫大醉一歲之忌暮莫逺行終身之忌然燈燭行房觸寒來者寒未解食熱食成刾風飲食竟仰卧成炁痞作頭風食上不得語語而食者常患胷背疼痛熱食訖以泠水酢漿漱口者令人口氣恒臰并作齒食生肉傷胃一切肉唯須爛煑停泠食之一切濕食及酒水漿臨上看不見人物之影者勿食之卆卒疰若已食腹脹者急以藥下之諸熱食鹹物竟不得飲泠漿水致失聲成尸咽腹内有宿病勿食陵鯉宍害人勿飲酒令至醉即終身百病不除久飲酒者腐腸爛胃潰髓蒸筋傷神損壽勿食一切腦大佳丈夫頭勿北卧勿當屋梁脊下卧卧訖仍勿留燈燭令人魂魄及六神不安多愁怨凡墻北勿安牀勿靣向北坐久思不祥起勿怒目久視日月失明丈夫見十步直墻勿順卧風利吹人發癲及體重凡大汗勿即脫衣多得偏風半身不遂夜卧當耳勿有孔吹耳聾凡逺行疲乏來勿入房久爲五勞虛損少子凡苽入水則沉者食之得泠終身不差人行汗出勿跂牀懸脚久成血痹腰疼兩足重凡熱食汗出勿盪風發痓頭痛令目澁饒睡凡欲眠勿歌詠不祥起眠不大語損氣力凡人頭邊勿安火爐日則承火氣頭重目晴赤及鼻乾冬日温足凍腦春秋腦足俱凍此聖人常法夜卧勿覆其頭得長壽凡人魘勿燃燈唤之定魘死不疑闇唤之亦不得近而急唤人眠勿以脚懸蹋高處久成腎病及損房足泠若人卧訖勿張口久成銷渴及失血色正月寅日燒白髮吉凡寅日剪手指甲午日剪足指甲又燒白髮并吉旦勿嗔恚且下牀勿叱咤咄呼勿惡言勿舉足向火勿對竈駡詈夜飲勿過醉飽勿精思勿爲勞若事有損且勿嗟嘆勿唱叫奈何日請禍勿堅膝坐而交臂膝上勿令髮覆靣皆不祥也清旦恒言善事聞惡事取向來方三唾之吉夜惡夢不須說平旦以水向東方噀之咒曰惡夢着草木好夢成珠玉即無咎凡上牀坐先脫左足或行或乘馬不用廻顧則神去勿煞龜蛇勿陰霧中逺行凡欲行來常存魁罡在頭上所向皆吉若欲征戰存斗柄在前以指敵吉勿北向大小便一云向西勿北唾犯魁罡神㐫一云勿向北冠帶㐫勿食父母本命獸肉令人命不長㐫勿食巳本命獸肉食之令人魂𩲸飛揚勿臘日歌葬凶旦起着衣返便着吉衣光者當户三振之咒曰殃去殃去吉勿閉塞故井及水瀆令人聾盲凡旦起勿開目洗靣令人目澁失明饒淚夫妻不同日沐浴恒欲晦日浴朔日沐逺行途中觸熱逢河水勿洗靣生烏皯炊湯經宿洗人體成癬洗靣無光作畦瘡忍溺不小便者膝泠成痹疾忍大便不出成氣痔小便勿怒令人兩足及膝泠大便不用呼氣及强弩令人腰疼目澁宜任之熱泔洗頭泠水濯足作頭風飲水沐髮亦作頭風夜沐髮不食即卧令人心虛饒汗多夢勿嗽嗽時病新汗解勿令泠水洗浴心胞不能復水銀不可近陰令玉莖銷縮又不得近牙齗腫損落齒鹿猪二脂亦不得近陰令人陰痿不起樊石不煉入藥用破人心肝小粉不可治寸白有鈆入腹成泠病諸空腹不用見諸臭氣屍入鼻舌上白起口中常臰若欲見尸先須飲酒見之能辟毒夏不用屋檐上下露靣皮厚多成癬一云靣風勿飲深陰地泠水作痎瘧凡遇神廟慎勿輒入入必恭敬之吉不得華目恣意顧瞻當如對嚴君焉乃厚其福耳如其不尓即獲其禍亦不得反首顧視忽見龍蛇勿興心驚恠之亦勿注意瞻視忽見光恠變異之事即强抑勿恠之諺曰見恠不恠其恠自壞也凡見殊妙美女慎勿熟視親而愛之此當是魑魁之物使人深愛也無問空山曠野稠人廣衆皆亦如之善惡亦勿說婦人月水來不用食蓼及蒜當爲血淋也熊猪二脂不作燈火烟氣入目光不能逺視母淚不得墮子眼中睛即破翳出小兒不用指月兩耳邊生瘡宜斷名月蝕瘡一切瘡着蝦蟆末不畏蟲食之産婦不欲見胡臭人令發腫水有沙虱勿在中沐浴害人欲渡水者隨馬驢後渡吉有水弩之處射人影即死渡水者先以物打水上其弩即發急渡不傷人山水烏土中有泉者不可久居常食作癭疾動氣增患病人不可食多發卆瘡諸山有孔云入採寶唯三月九月餘月山閉氣煞人人卧春夏向東秋冬向西此爲常法人饑須坐小便若飽須立小便慎之無病除虛損人常須日在巳時食食訖則不須飲酒終身不乾嘔凡養性之道在於勿洩則可以長生此要道也但能不洩經五十日腰脚輕便眼目精爽百戰不怠按摩法第四自按摩法日三過一月後百病並除行及奔馬此是神仙上法一兩手相捉紐捩如洗手法一兩手淺相义翻復向胷一兩手相捉共按䏶左右同一兩手相重按䏶徐徐捩身一如挽五石力弓左右同一作拳向前築左右同一如拓石法左右同一以拳頓此開胷左右同一兩手抱頭宛轉䏶上此是抽脇法一兩手據地縮身曲脊向上三舉一大坐斜身偏欹如排山左右同一以手槌背上左右同一大坐申脚三用當此名虎視法左右同一立地兩手着地反拗三舉一兩手急相义以脚踏手中左右同一起立以脚前後踏左右同一大坐申脚用當相交手勾所申脚着膝上以手按之左右同凡一十八勢但老人日若能依此法三遍者如常補益延年續命百病皆除能食眼明輕徤不復疲乏老子按摩法兩手捺䏶左右捩身各二十遍兩手捺䏶左右紐肩亦二十遍兩手抱頭左右紐身二十遍左右跳頭二過一手抱頭一手托膝三折左右同兩手拓頭三舉之一手拓膝一手拓頭從下至上三過左右同兩手攀頭下向三頓之兩手相捉頭上過左右亦三遍兩手相义拓心前却挽亦三過左右亦三遍兩手相反拓着心亦三遍曲腕策肋肘左右亦三過反手着膝上挽肘覆手着膝上挽肘左右各三遍舒手挽項左右三過左右手㧞前後各三過手摸肩從上至下使三過左右亦尒兩手空拳築三過外振手三遍内振手三遍覆振手亦三過却摇手亦三過摩紐指三過兩手反摇三過兩手上聳亦三過兩手下頓亦三過兩手相义反頭上反覆各七遍兩手反义上下担肘無數單用十手也兩手相义頭上過左右申肋十遍兩手拳反背上掘脊上下亦三過掘者揩也兩手反捉上下直脊三遍覆手振仰手振各三覆掌曲肘搦腕内外振各三遍覆掌前後聳三過覆掌兩手相交横三遍覆手横直聳三遍若有手患泠者聳上打至下得熱便休舒左脚右手承之左手捺脚聳上至下直脚三遍左手捺脚亦尓前却抑足三遍左捩右捩足三遍前捩却捩三遍直脚三遍扭䏶三遍内外振脚三遍若有脚泠者打熱便休扭䏶以意多少頓肚三遍前直肚三遍却直肚亦三遍虎據左右扭肩三遍推天拓天左右各三度左右排山負山㧞樹各三度舒兩手直並頓申手三遍舒兩手舒兩膝亦三過舒兩脚直反摇頭頓伸左右扭腰三遍㧞内脊外脊各三過用氣法第五每旦夕旦夕者是陰陽轉换之時凡旦夕五更初暖炁至頻申眠開目是上生氣至名曰陽息而陰消暮日入後泠炁至慄慄然時乃坐睡倒時是下生氣至名曰陽消而陰息暮日入後泠氣常出入天地日月山川河海人畜草木一切萬物體中代謝徃來無一時休息一進一退如晝夜之更迭如河海水之潮汐是天地消息之道也面向午展兩手扵膝上徐徐挼捺支節口吐濁氣鼻引清氣凡吐去故炁亦名死炁納者納取新炁亦名生炁故老子經云玄牝之門天地之根綿綿若存用之不勤言口是天地之門可以出納陰陽死生之炁也良久徐徐乃以手左拓右拓上拓下拓前拓後拓瞋目張口仰頭拔耳挽髮捩腰咳嗽發陽震動雙作隻作反手爲之然後掣足仰展數八十九十而止仰下徐徐定心作内觀之法想見空中太和元氣漸下入毛際漸漸入頂如雨晴雲入山入皮入𡖆至骨至腦漸漸下入腹中四支五藏皆受其潤如水滲入地若徹則覺腹中有聲汩汩然意專思存不得外縁斯須則元氣達扵氣海須臾則自達扵涌泉若徹則覺身體振動兩脚蜷屈亦令牀坐有聲拉拉然則名一通一通兩通乃至日别得三通五通則覺身體潤澤面色光澤膚毛潤悅耳目精明令人食美力徤百病皆去五年十歲長存不忘得滿千萬通則去仙不逺矣調氣法彭祖曰和神導氣道當得宻室閉户安牀煖席枕高二寸半正身偃卧𡨋目閉炁於胷膈中以鴻毛着鼻上而不動經三百息耳無所聞目無所見心無所思如此則寒暑不爲害蜂蠆不能毒壽三百六十歲此鄰於真人也彭祖曰道不在煩但能不思衣食不思聲色不思勝負不思曲直不思得失不思榮辱心無煩形勿極而羔之導引行氣不已亦可長生千歲不死凡人不可無思當以漸遣除之人身虛無但有游炁炁息得理即百病不生若消息失宜即諸痾競起故善攝養者須知調氣方焉調氣方治萬病大患百日生眉鬢也餘者不足言凡調炁之法夜半後日中前氣生得調日中後夜半前氣死不得調調氣時仰卧牀鋪厚軟枕高下共身平舒手展兩脚兩手握大母指節去身四五寸兩脚相去四五寸引氣從鼻入足即停止有力更取久住氣悶從口細細吐出盡還從鼻細細引入出氣一准前法若患寒熱及卒患癰腫不問日中後患未發前一食間即調如其不得好差明日依前式更調之若患心泠病氣即呼出若熱病氣即吹出若肝病即噓出若肺病即呵出若脾病即嘻出若腎病即呬出夜半後八十一鷄鳴前七十二平旦六十三日出五十四食時四十五巳時三十六欲作此法先左右導引三百六十遍治病有四一泠二疰三風四熱右若有患者安心此法無有不差也凡百病不離五藏事須識其相類善以知之心藏病者體泠熱相法心色赤患者夢中見人者赤衣赤刀杖火怖人治之法用呼吹二氣屬心呼治泠吹治熱肺藏病者體胷背滿脹四肢煩悶相法肺色曰患者喜夢見美女美男詐附人共相抱持或作父母兄弟妻子治法用噓炁出肝藏病者愁憂不樂悲思不喜頭眼疼相法肝色青夢見人著青衣持青杖或獅子虎狼來恐怖人治法用呵炁出脾藏病者體上游風習習痛悶疼相法脾色黄通土色或作小兒擊歷人取猶人或如游風團攣轉治法用唏氣出腎病者體泠而陰衰相法腎色黑者夢見黑衣持黑杖怖人治法用呬氣出之凡用大呼三十遍細呼十遍呼法鼻中引氣入口中出吐氣當令聲相逐呼字而吐之熱病者用大吹五十遍細吹十遍吹物之法吹當使字氣聲似字心悶者用噓三十遍細噓十遍肝病者用大呵三十遍細呵十遍心病者用大唏三十遍細唏十遍有泠者用大呬五十遍細呬三十遍此十二種調氣法若有病者依此法恭敬用心無有不差皆須左右導引三百六十遍乃爲之居處法第六凡人居止之室必須固宻勿令有細隙致有風氣得入久居不覺使人中風古來忽有得偏風者四肢不遂或角弓反張或失音不能語者皆由忍此耳身旣得風衆病總集邪鬼得便遭此致卒者十中有九是以大須周宻凡在家及行卒逢大飄風暴雨大霧者此皆是諸龍鬼神行動經過所致宜入室門户燒香靜坐安心以避待過後乃出不尓損人或時雖未有若於後不佳居家不欲數沐浴浴必須宻室之内不得大熱亦不得大泠大熱大泠皆生百病冬浴必不得使汗出霡沐浴後不得觸風泠饑忌浴飽忌沐浴訖須進少許食飲乃出覺室有風勿强忍勿反坐須起避之凡居家當誡勒内外長幼有不快者即須早道勿使隱忍以爲無苦過時不知便爲重病遂成不救小有不好即須按摩挼捺令百節通利泄其邪炁也凡人無問有事無事恒須日别一度遣人蹋脊背反四肢頭頂若令熟蹋即風氣時行不能着人此大要妙不可具論凡人居家及逺行隨身恒有熟艾一勝備急丸辟鬼丸生肌藥甘濕藥丁腫水銀大黄芒硝甘草乾姜桂心蜀椒不能更畜餘藥此等恒有不可闕少及一兩卷百一隨身備急藥方並帶避毒蛇蜂蝎蠱毒藥隨身也凡人自覺十日已上康健即須灸三數穴以泄風氣爲佳勿以康健謂之常然恒須安不忘危豫防諸患灸當辟人神凡畜手力細累每春秋皆與一服轉瀉藥一度則不中行時氣黄帝問於岐伯曰風之傷人或爲熱中或爲寒中或爲厲風或爲偏枯或爲則風故以春甲乙傷於風者爲肝風夏丙丁傷於風者爲心風以四季戊巳傷於風者爲脾風以秋庚辛傷於風者爲肺風以冬壬癸中於風者爲腎風風氣中五藏六府之俞亦爲藏府之風各入其門户所中則爲偏風風氣循風府而上則爲腦風入頭則爲目風眼寒飲酒中風則爲傷風入房汗出中風則爲内風新沐中風則爲首風久風入房則爲傷風飡洩水在腠裏則爲泄風故風者百病之長也至其變化爲他病無常方然故有風氣焉春之三月此謂發凍天地俱生萬物以榮夜卧早起廣步於庭被髮緩形以使志生生而勿煞與而勿奪賞而勿罰此春之應也養生之道逆之傷於肝爲寒變奉生者少夏三月此謂播秀天地氣交萬物華實夜卧晚起毋厭於日使志毋怒使華英成秀使氣泄所愛在外此夏氣之應也養生之道逆之則傷心秋爲痎瘧則奉長者少冬重病秋之三月此謂審平天氣以急地氣以明早卧早起與鷄俱興使志安寧以緩秋形收斂神氣使秋氣平毋外其志使肺氣精此秋氣之應養收之道逆之則傷肺早爲飡泄則奉養者少冬之三月此謂陰氣閉藏水凍地拆無損乎陽明起早卧晩必待日光使志若伏若匿有私意已有得去寒就暖毋泄皮膚使氣極此冬之應也養生之道逆之則傷腎春爲萎厥則奉生者少天有四時五行以生寒暑燥濕人有五藏以生喜怒悲樂有恐懼故喜怒傷氣寒暑傷形故曰喜怒不節寒暑過度生乃不固重陰必陽生重陽必陰生故曰冬傷於寒春必病温春傷於風夏必飡泄夏傷於暑秋必痎瘧秋傷於濕冬必咳嗽人能依此四時攝養故得免其夭枉也太清道林攝生論
